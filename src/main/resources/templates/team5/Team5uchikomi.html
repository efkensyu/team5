<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Typing555!</title>
<link rel="stylesheet" th:href="@{/Team5/Team5uchikomi.css}" type="text/css">
</head>
<body>
    
    <div class="positionCenter game-container">
        <p class="sampleBody question-text">
            <th:block th:text = "${reibun}"></th:block>
        </p>
    </div>

    <form method="post" th:action="@{/Team5/result}">
        <div class="positionCenter">
            <textarea name="inputText"></textarea>
            
            <br>
            <input type="submit" name="next" value="完了！" class="btn-complete" />
        </div>
    </form>

    <form method="post" th:action="@{/Team5/typi}">
        <div class="positionCenter">
            <input type="submit" name="return" value="戻る" class="btn-back" />
        </div>
    </form>

</body>
</html>
