<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<link rel = "stylesheet" th:href="@{../team5/Team5touroku.css}">
<head>
<meta charset="UTF-8">
<title>Typing555!</title>
</head>
<body>
	<h1>新規会員登録</h1>
	<form method="post" th:action="@{/Team5/tourokuExecute}" th:object="${team5Account}">
			<p th:if="${isDuplicated == -1}" style="color: red;">このIDは既に登録されています。</p>
			<p id="confirmError" style="color: red; display:none;">パスワードが一致しません</p>
	        <h4>ユーザーネーム</h4>
	        <input type="text" th:field="*{userId}" />
	        <p th:if="${#fields.hasErrors('userId')}" th:errors="*{userId}" style="color: red;"></p>
	        
	        <br>
	        <h4>パスワード</h4>
	        <input type="password" th:field="*{passWord}" id="passWord"/>
	        <p th:if="${#fields.hasErrors('passWord')}" th:errors="*{passWord}" style="color: red;"></p>
			
			<br>
			<h4>パスワード（確認）</h4>
			<input type="password" id="passWordConfirm" />
			
	        
	        <br><br>
	        <input type="submit" value="登録" onclick="return checkPassword()"/>
	    </form>
		<form method="post" th:action="@{/Team5/loginback}" >
		<input type="submit" name="loginback" value="戻る"/>
		</form>
		<script>
		function checkPassword() {
		    const pw = document.getElementById("passWord").value;
		    const confirm = document.getElementById("passWordConfirm").value;
		    if (pw !== confirm) {
		        document.getElementById("confirmError").style.display = "block";
		        return false;
		    }
		    return true;
		}
		</script>
</body>
</html>
