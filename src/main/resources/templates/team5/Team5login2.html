<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<link rel = "stylesheet" th:href="@{/Team5/Team5login2.css}">
<head>
<meta charset="UTF-8">
<title>Typing555!</title>
</head>
<body>
	<h1>ログイン</h1>
	<form method="post" th:action="@{/Team5/menu}" >
		<!-- 空白の場合 -->
		<p th:if="${logged == -2}" style="color:red;">IDまたはパスワードを入力してください</p>

		<!-- 不一致の場合 -->
		<p th:if="${logged == -1}" style="color:red;">IDまたはパスワードが間違っています</p>
			<h4>ユーザーネーム</h4>	
			<input type="text" name="userId" />
			<br>
			<h4>パスワード</h4>
			<input type="text" name="passWord"/>	
			<br>
			<input type="submit" name="menu" value="ログイン" />
		</form>
		
		<form method="post" th:action="@{/Team5/loginback}" >
		<input type="submit" name="loginback" value="戻る" />
		</form>
</body>
</html>
